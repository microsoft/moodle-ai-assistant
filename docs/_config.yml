title: Moodle AI Chat
description: An accelerator for deploying an AI Agent on Moodle — powered by Azure OpenAI and a full RAG pipeline.
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Site settings
url: ""
baseurl: ""

# Navigation
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 4
  preview_words_after: 4
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true

# Aux links in the upper right
aux_links:
  "GitHub":
    - "https://github.com/microsoft/moodle-ai-assistant"
  "Latest release":
    - "https://github.com/microsoft/moodle-ai-assistant/releases/latest"

aux_links_new_tab: true

# Footer
footer_content: "Moodle AI Chat &mdash; MIT License. Hosted on GitHub Pages."

# Color scheme
color_scheme: light

# Callouts
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: purple

# Files to exclude from the site build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - build.sh
  - build.ps1

# Kramdown / markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

permalink: pretty

# Just-the-docs navigation order (configured via front-matter in each .md file).
